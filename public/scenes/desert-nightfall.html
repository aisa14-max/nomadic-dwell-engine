document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Desert Nightfall<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n  :root{\n    --dur: 8s;\n  }\n  *{box-sizing:border-box}\n  html,body{\n    margin:0;height:100%;\n    background:#000;\n    color:#e8e6e0;\n    font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    overflow:hidden;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ----- stage: 4:3-ish (1192x870 source). letterbox to viewport ----- */\n  .stage{\n    position:fixed; inset:0;\n    display:grid; place-items:center;\n    background:#000;\n  }\n  .frame{\n    position:relative;\n    width: 100vw;\n    height: 100vh;\n    aspect-ratio: auto;\n    overflow:hidden;\n    border-radius: 0;\n    box-shadow: 0 30px 120px rgba(0,0,0,.6);\n    isolation:isolate;\n  }\n\n  /* ----- layered images ----- */\n  .layer{\n    position:absolute; inset:0;\n    background-size:cover;\n    background-position:center center;\n    will-change: opacity, transform, filter;\n    transform-origin: 55% 70%;\n  }\n  .day      { background-image:url(\"d16feb1c-ed14-4ab3-87e9-de6441596e75\"); }\n  .magical  { display:none; }\n  .night    { background-image:url(\"76006f1b-fe2c-46a4-9a15-66f86deb42d9\"); opacity:0; }\n\n  /* ken burns push for every layer, single shared keyframe */\n  .layer{\n    animation: push var(--dur) cubic-bezier(.45,.05,.55,.95) forwards;\n  }\n  @keyframes push{\n    0%   { transform: scale(1.00); }\n    100% { transform: scale(1.06); }\n  }\n\n  /* per-layer opacity timelines — same total duration so they stay in sync.\n     0-15%  day held\n     15-40% crossfade day → magical\n     40-60% magical held\n     60-85% crossfade magical → night\n     85-100% night held\n  */\n  .day{\n    animation: push var(--dur) cubic-bezier(.45,.05,.55,.95) forwards,\n               dayFade var(--dur) ease-in-out forwards;\n  }\n  @keyframes dayFade{\n    0%      { opacity:1; filter:saturate(1) brightness(1); }\n    25%     { opacity:1; filter:saturate(1) brightness(1); }\n    70%     { opacity:0; filter:saturate(.7) brightness(.75); }\n    100%    { opacity:0; filter:saturate(.7) brightness(.75); }\n  }\n  .magical{\n    animation: push var(--dur) cubic-bezier(.45,.05,.55,.95) forwards,\n               magicalFade var(--dur) linear forwards;\n  }\n  @keyframes magicalFade{ 0%,100% { opacity:0; } }\n  .night{\n    animation: push var(--dur) cubic-bezier(.45,.05,.55,.95) forwards,\n               nightFade var(--dur) ease-in-out forwards;\n  }\n  @keyframes nightFade{\n    0%      { opacity:0; }\n    25%     { opacity:0; }\n    70%     { opacity:1; }\n    100%    { opacity:1; }\n  }\n\n  /* ----- horizon warmth that pulses during transition ----- */\n  .horizon{\n    position:absolute; inset:0;\n    background: radial-gradient(45% 32% at 50% 62%,\n        rgba(255,180,110,.55) 0%,\n        rgba(255,160,90,.28) 25%,\n        rgba(255,140,80,.10) 55%,\n        rgba(0,0,0,0) 85%);\n    mix-blend-mode: screen;\n    opacity:0;\n    pointer-events:none;\n    animation: horizonGlow var(--dur) ease-in-out forwards;\n  }\n  @keyframes horizonGlow{\n    0%      { opacity:.15; }\n    35%     { opacity:.6; }\n    55%     { opacity:.35; }\n    100%    { opacity:0; }\n  }\n\n  /* ----- vignette for cinematic feel ----- */\n  .vignette{\n    position:absolute; inset:0;\n    background: radial-gradient(120% 90% at 50% 55%,\n        rgba(0,0,0,0) 55%,\n        rgba(0,0,0,.45) 100%);\n    pointer-events:none;\n    mix-blend-mode: multiply;\n  }\n\n  /* ----- twinkling stars overlay (DOM-built) ----- */\n  .stars{\n    position:absolute; inset:0;\n    pointer-events:none;\n    opacity:0;\n    animation: starsFade var(--dur) ease-in forwards;\n    mix-blend-mode: screen;\n  }\n  @keyframes starsFade{\n    0%      { opacity:.15; }\n    50%     { opacity:.6; }\n    100%    { opacity:1; }\n  }\n  .star{\n    position:absolute;\n    width:2px; height:2px;\n    background: #fff;\n    border-radius:50%;\n    box-shadow: 0 0 6px 1px rgba(255,255,255,.7);\n    animation: twinkle 3.2s ease-in-out infinite;\n  }\n  @keyframes twinkle{\n    0%,100% { opacity:.2; transform: scale(.8); }\n    50%     { opacity:1;  transform: scale(1.4); }\n  }\n\n  /* ----- drifting magical particles (fireflies) ----- */\n  .fireflies{\n    position:absolute; inset:0;\n    pointer-events:none;\n    opacity:0;\n    animation: fireFade var(--dur) ease-out forwards;\n    mix-blend-mode: screen;\n  }\n  @keyframes fireFade{\n    0%      { opacity:.9; }\n    50%     { opacity:.4; }\n    100%    { opacity:0; }\n  }\n  .fly{\n    position:absolute;\n    width:6px; height:6px;\n    border-radius:50%;\n    background: radial-gradient(circle, #fff7d6 0%, rgba(255,225,140,.6) 40%, rgba(255,200,90,0) 70%);\n    filter: blur(.3px);\n    animation: drift 9s ease-in-out infinite;\n  }\n  @keyframes drift{\n    0%   { transform: translate(0,0)        scale(.6); opacity:0; }\n    15%  { opacity:1; }\n    50%  { transform: translate(40px,-60px) scale(1.1); opacity:.9; }\n    85%  { opacity:.7; }\n    100% { transform: translate(-20px,-140px) scale(.5); opacity:0; }\n  }\n\n  /* ----- shooting star ----- */\n  .shoot{\n    position:absolute;\n    top:14%; left:-10%;\n    width:160px; height:1.5px;\n    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.9), rgba(255,255,255,0));\n    transform: rotate(18deg);\n    filter: drop-shadow(0 0 6px #fff);\n    opacity:0;\n    animation: shoot var(--dur) ease-out forwards;\n  }\n  @keyframes shoot{\n    0%, 55%   { transform: translate(-20vw, 0) rotate(18deg); opacity:0; }\n    62%       { opacity:1; }\n    78%       { transform: translate(120vw, 35vh) rotate(18deg); opacity:0; }\n    100%      { opacity:0; }\n  }\n\n  /* ----- subtle moonlight rim on hut during night ----- */\n  .moon{\n    position:absolute;\n    width:14px; height:14px;\n    top:32%; right:18%;\n    border-radius:50%;\n    background: radial-gradient(circle, #f4ecd8 0%, rgba(244,236,216,.4) 40%, rgba(0,0,0,0) 70%);\n    box-shadow: 0 0 40px 12px rgba(244,236,216,.18);\n    opacity:0;\n    animation: moonRise var(--dur) ease-out forwards;\n  }\n  @keyframes moonRise{\n    0%       { opacity:0; transform: translateY(20px); }\n    50%      { opacity:0; transform: translateY(15px); }\n    100%     { opacity:.85; transform: translateY(0); }\n  }\n\n  /* ----- caption ----- */\n  .caption{\n    position:absolute;\n    left:0; right:0; bottom:6%;\n    text-align:center;\n    color:rgba(255,255,255,.85);\n    letter-spacing:.34em;\n    text-transform:uppercase;\n    font-size: clamp(10px, 1vw, 14px);\n    font-weight:300;\n    pointer-events:none;\n    text-shadow: 0 1px 12px rgba(0,0,0,.6);\n  }\n  .caption span{\n    display:inline-block;\n    opacity:0;\n    animation: capCycle var(--dur) linear infinite;\n  }\n  .caption span:nth-child(1){ animation-delay: 0s; }\n  .caption span:nth-child(2){ animation-delay: calc(var(--dur) * -.66); }\n  .caption span:nth-child(3){ animation-delay: calc(var(--dur) * -.33); }\n  @keyframes capCycle{\n    0%   { opacity:0; transform: translateY(6px); letter-spacing:.5em; }\n    8%   { opacity:1; transform: translateY(0);  letter-spacing:.34em; }\n    25%  { opacity:1; }\n    33%  { opacity:0; transform: translateY(-4px); letter-spacing:.34em; }\n    100% { opacity:0; }\n  }\n  /* hide the duplicate stacked captions; each span is positioned over the same line */\n  .caption span{ position:absolute; left:0; right:0; }\n\n  /* ----- play/pause control ----- */\n  .controls{\n    position:fixed;\n    left:50%; bottom:18px;\n    transform:translateX(-50%);\n    display:flex; gap:14px; align-items:center;\n    background: rgba(20,18,15,.55);\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    border:1px solid rgba(255,255,255,.08);\n    padding:10px 14px;\n    border-radius:999px;\n    color:rgba(255,255,255,.82);\n    font-size:12px;\n    letter-spacing:.18em;\n    text-transform:uppercase;\n    user-select:none;\n    z-index:20;\n  }\n  .controls button{\n    background:none;border:0;color:inherit;cursor:pointer;\n    font: inherit; letter-spacing:.18em; padding:4px 8px;\n  }\n  .controls .dot{\n    width:6px;height:6px;border-radius:50%;\n    background:#e8e6e0;\n    box-shadow: 0 0 8px rgba(255,255,255,.5);\n  }\n  .paused .layer,\n  .paused .horizon,\n  .paused .stars,\n  .paused .fireflies,\n  .paused .shoot,\n  .paused .moon,\n  .paused .star,\n  .paused .fly,\n  .paused .caption span{ animation-play-state: paused !important; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"stage\" id=\"stage\">\n    <div class=\"frame\" id=\"frame\">\n      <div class=\"layer day\"><\u002Fdiv>\n      <div class=\"layer magical\"><\u002Fdiv>\n      <div class=\"layer night\"><\u002Fdiv>\n\n      <div class=\"horizon\"><\u002Fdiv>\n      <div class=\"moon\"><\u002Fdiv>\n      <div class=\"shoot\"><\u002Fdiv>\n\n      <div class=\"fireflies\" id=\"fireflies\"><\u002Fdiv>\n      <div class=\"stars\" id=\"stars\"><\u002Fdiv>\n\n      <div class=\"vignette\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n  // ---- generate twinkling stars ----\n  (function(){\n    const stars = document.getElementById('stars');\n    const N = 140;\n    const frag = document.createDocumentFragment();\n    for(let i=0;i<N;i++){\n      const s = document.createElement('div');\n      s.className = 'star';\n      // distribute across upper 60% of frame\n      const x = Math.random()*100;\n      const y = Math.random()*60;\n      const size = Math.random()*2 + 1; // 1-3px\n      s.style.left = x+'%';\n      s.style.top  = y+'%';\n      s.style.width = s.style.height = size+'px';\n      s.style.animationDelay = (Math.random()*3.2).toFixed(2)+'s';\n      s.style.animationDuration = (2.2 + Math.random()*2.6).toFixed(2)+'s';\n      // dimmer further from milky way arc\n      s.style.opacity = (.3 + Math.random()*.7).toFixed(2);\n      frag.appendChild(s);\n    }\n    stars.appendChild(frag);\n  })();\n\n  // ---- generate fireflies / drifting motes around hut ----\n  (function(){\n    const fire = document.getElementById('fireflies');\n    const N = 36;\n    const frag = document.createDocumentFragment();\n    for(let i=0;i<N;i++){\n      const f = document.createElement('div');\n      f.className = 'fly';\n      // cluster mid-low; a few stragglers higher\n      const cx = 50 + (Math.random()-.5)*80; // 10..90\n      const cy = 55 + Math.random()*40;      // 55..95 (lower part of frame)\n      const size = 4 + Math.random()*8;\n      f.style.left = cx+'%';\n      f.style.top  = cy+'%';\n      f.style.width = f.style.height = size+'px';\n      f.style.animationDuration = (6 + Math.random()*7).toFixed(2)+'s';\n      f.style.animationDelay    = (Math.random()*9).toFixed(2)+'s';\n      f.style.opacity = (.6 + Math.random()*.4).toFixed(2);\n      frag.appendChild(f);\n    }\n    fire.appendChild(frag);\n  })();\n\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
